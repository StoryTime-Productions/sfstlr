name: Feature Request
description: Suggest an improvement or new feature
labels: [enhancement]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: One-line description of the feature
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Problem / motivation
      placeholder: What problem does this solve? Why do you need it?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe what you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any other approaches you've thought about?
    validations:
      required: false
